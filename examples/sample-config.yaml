version: 1
web:
  saved_plan_apply: true
  approval_timeout_seconds: 300
  reviewed_plan_timeout_seconds: 3600
  # Use {ticket} where the ticket number belongs, or omit it to append /<ticket>.
  ticketing_url: null
  # Optional global instructions used by Reconcile with AI for every repository.
  # Repository, branch, commit, and Terraform output context is added by tf9.
  # reconcile_prompt: |
  #   Follow our team drift-reconciliation runbook and include the ticket number.
repositories:
  - name: infrastructure
    path: /home/andres/tf-companion/examples/infrastructure
    default_aws_profile: example-dev
    default_region: eu-west-2
    # default_account_id: "123456789012"
    targets:
      - name: dev
        directory: environments/dev
        aws_profile: example-dev
        region: eu-west-2
      - name: prod
        directory: environments/prod
        aws_profile: example-prod
        region: eu-west-2
  # Large, credential-free Terraform plan for testing the Graph View blast
  # radius (see examples/blast-radius/README.md). Adjust path to your checkout.
  - name: blast-radius
    path: /home/andres/tf9/examples
    targets:
      - name: demo
        directory: blast-radius
        aws_profile: example-dev
        region: eu-west-2

# Global directory → AWS profile mappings. Used by `tf9 plan --recursive` (-R):
# cd into a parent folder and run across all child terraform dirs, each with the
# configured profile. Slice order = execution order. --profile overrides all rows.
# profile_mappings:
#   - dir: dev
#     profile: company-dev
#   - dir: qa
#     profile: company-qa
#   - dir: prod
#     profile: company-prod
