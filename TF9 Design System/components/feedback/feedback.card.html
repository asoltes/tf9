<!DOCTYPE html>
<html lang="en">
<head>

<style>
  body { margin: 0; padding: 20px 24px; background: var(--bg-layout); font-family: var(--sans); }
  .row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 18px; }

<div id="root"></div>
<script type="text/babel">
