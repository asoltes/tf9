<!-- @dsCard group="Colors" viewport="700x250" name="Terraform Command Colors" subtitle="Per-command semantic colors for badges and terminal headers" -->
<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 18px 22px; background: var(--bg-layout); font-family: var(--sans); }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; }
  .cmd { display: flex; align-items: center; gap: 9px; padding: 7px 10px; background: var(--container); border-radius: 8px; border: 1px solid var(--divider); }
  .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .name { font-size: 12px; font-weight: 700; font-family: var(--mono); }
  h3 { font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: var(--text-3); font-weight: 700; margin: 0 0 12px; }
</style>
</head>
<body>
  <h3>Command Colors (Light Theme)</h3>
  <div class="grid">
    <div class="cmd"><div class="dot" style="background:#0969da"></div><span class="name" style="color:#0969da">init</span></div>
    <div class="cmd"><div class="dot" style="background:#1a7f37"></div><span class="name" style="color:#1a7f37">plan</span></div>
    <div class="cmd"><div class="dot" style="background:#bc4c00"></div><span class="name" style="color:#bc4c00">apply</span></div>
    <div class="cmd"><div class="dot" style="background:#cf222e"></div><span class="name" style="color:#cf222e">destroy</span></div>
    <div class="cmd"><div class="dot" style="background:#8250df"></div><span class="name" style="color:#8250df">auto</span></div>
    <div class="cmd"><div class="dot" style="background:#0a7c86"></div><span class="name" style="color:#0a7c86">validate</span></div>
    <div class="cmd"><div class="dot" style="background:#57606a"></div><span class="name" style="color:#57606a">refresh</span></div>
    <div class="cmd"><div class="dot" style="background:#9a6700"></div><span class="name" style="color:#9a6700">state</span></div>
    <div class="cmd"><div class="dot" style="background:#1f6feb"></div><span class="name" style="color:#1f6feb">import</span></div>
    <div class="cmd"><div class="dot" style="background:#b35900"></div><span class="name" style="color:#b35900">taint</span></div>
    <div class="cmd"><div class="dot" style="background:#218bff"></div><span class="name" style="color:#218bff">untaint</span></div>
    <div class="cmd"><div class="dot" style="background:#b4690e"></div><span class="name" style="color:#b4690e">cost</span></div>
  </div>
</body>
</html>
