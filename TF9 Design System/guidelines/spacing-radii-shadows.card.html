<!-- @dsCard group="Spacing" viewport="700x200" name="Radii & Shadows" subtitle="Corner radius scale and shadow system" -->
<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px 24px; background: var(--bg-layout); font-family: var(--sans); color: var(--text); }
  .row { display: flex; gap: 20px; align-items: flex-start; margin-bottom: 20px; }
  .section-label { font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: var(--text-3); font-weight: 700; margin-bottom: 12px; }
  .items { display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-end; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .box { width: 48px; height: 36px; background: var(--blue); opacity: .85; }
  .shadow-box { width: 60px; height: 40px; background: var(--container); }
  .label { font-size: 10px; font-weight: 700; color: var(--text-3); font-family: var(--mono); text-align: center; }
  .val { font-size: 9px; color: var(--text-3); font-family: var(--mono); text-align: center; }
</style>
</head>
<body>
  <div>
    <div class="section-label">Corner Radii</div>
    <div class="items">
      <div class="item"><div class="box" style="border-radius:4px"></div><div class="label">sm</div><div class="val">4px</div></div>
      <div class="item"><div class="box" style="border-radius:8px"></div><div class="label">i (input)</div><div class="val">8px</div></div>
      <div class="item"><div class="box" style="border-radius:10px"></div><div class="label">md</div><div class="val">10px</div></div>
      <div class="item"><div class="box" style="border-radius:16px"></div><div class="label">c (card)</div><div class="val">16px</div></div>
      <div class="item"><div class="box" style="border-radius:9999px;width:60px"></div><div class="label">pill</div><div class="val">20px+</div></div>
    </div>
  </div>
  <div style="margin-top:20px">
    <div class="section-label">Shadows</div>
    <div class="items">
      <div class="item"><div class="shadow-box" style="box-shadow:0 1px 2px rgba(0,7,22,.12);border-radius:8px"></div><div class="label">sm</div><div class="val">1px blur</div></div>
      <div class="item"><div class="shadow-box" style="box-shadow:0 1px 4px -1px rgba(0,7,22,.12),0 0 0 1px #e9ebed;border-radius:8px"></div><div class="label">c (card)</div><div class="val">4px + ring</div></div>
      <div class="item"><div class="shadow-box" style="box-shadow:0 4px 20px rgba(0,7,22,.20),0 0 0 1px #e9ebed;border-radius:8px"></div><div class="label">pop</div><div class="val">20px blur</div></div>
    </div>
  </div>
</body>
</html>
