<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--nav-bg); display: flex; align-items: center; justify-content: center; gap: 48px; height: 180px; font-family: var(--sans); }
  .logo-wrap { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .logo-wrap img { display: block; }
  label { font-size: 11px; color: #6d8099; text-transform: uppercase; letter-spacing: .5px; }
  .on-light { background: #f2f3f3; border-radius: 10px; padding: 14px 20px; display: flex; align-items: center; }
</style>
</head>
<body>
  <div class="logo-wrap">
    <img src="../assets/tf9-logo.svg" width="174" height="54" alt="tf9 logo">
    <label>Wordmark — on dark</label>
  </div>
  <div class="logo-wrap">
    <img src="../assets/tf9-mark.svg" width="36" height="36" alt="tf9 mark">
    <label>Mark — on dark</label>
  </div>
  <div class="logo-wrap">
    <div class="on-light"><img src="../assets/tf9-logo.svg" width="140" height="44" alt="tf9 logo light"></div>
    <label>Wordmark — on light</label>
  </div>
</body>
</html>
