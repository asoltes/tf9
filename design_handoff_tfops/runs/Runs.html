    <div class="runs-topbar">
      <div class="crumbs"><a>tfops</a><span class="sep">/</span><span class="cur">Runs</span></div>
      <div class="runs-head">
        <div>
          <div class="page-title">Runs <span class="counter" id="runsCount"></span></div>
          <div class="page-desc">Terraform runs across your repositories. Select a run to stream its output.</div>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          <button class="btn btn-icon" title="Refresh" style="border:1px solid var(--border);width:34px;height:34px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" width="17" height="17"><path d="M21 12a9 9 0 1 1-3-6.7L21 8"/><path d="M21 3v5h-5"/></svg></button>

        </div>
      </div>
    </div>

    <div class="runs-dock bottom" id="runsDock">
      <div class="runs-content">
        <div class="runs-table-scroll">
          <div class="container flush">
            <table class="runs-tbl" id="runsTbl"></table>
          </div>
        </div>
      </div>

      <!-- split panel -->
      <div class="splitpanel" id="splitpanel">
        <div class="sp-handle" id="spHandle"><span class="bar"></span></div>
        <div class="sp-inner">
          <div class="sp-head">
            <div class="sp-title">
              <span class="rid" id="spRunId">run</span>
              <span class="rstatus" id="spStatus"></span>
            </div>
            <div class="sp-actions">
              <div id="spActions" style="display:flex;align-items:center;gap:8px"></div>
              <div class="dock-toggle" id="dockToggle" title="Split panel position">
                <button data-dock="side" title="Dock to side"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><line x1="15" y1="4" x2="15" y2="20"/></svg></button>
                <button data-dock="bottom" class="on" title="Dock to bottom"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><line x1="3" y1="14" x2="21" y2="14"/></svg></button>
              </div>
            </div>
          </div>
          <div class="sp-body" id="spBody"></div>
        </div>
      </div>
    </div>

<!-- fullscreen terminal modal -->
<div class="fs-backdrop" id="fsOverlay">
  <div class="fs-modal">
    <div class="fs-header">
      <div class="fs-header-left">
        <div class="fs-dots"><span></span><span></span><span></span></div>
        <span class="fs-title" id="fsTitle"></span>
      </div>
      <div class="fs-header-right">
        <span id="fsStats"></span>
        <div class="fs-actions">
          <button class="fs-action-btn" id="fsCopy" title="Copy output">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            Copy
          </button>
          <button class="fs-action-btn" id="fsDownload" title="Download output">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M12 3v12m0 0-4-4m4 4 4-4"/><path d="M4 21h16"/></svg>
            Download
          </button>
        </div>
        <div class="fs-divider"></div>
        <button class="fs-close" id="fsClose" aria-label="Close fullscreen">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>
    </div>
    <div class="tc-body fs-body" id="fsBody"></div>
  </div>
</div>
