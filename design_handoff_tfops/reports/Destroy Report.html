<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Terraform Destroy · tf9</title>
<script>
// Apply stored theme before first paint to avoid flash
(function () {
  var m = localStorage.getItem("tf9-color-mode");
  document.documentElement.setAttribute("data-theme", m === "light" ? "light" : "dark");
})();
</script>
<link rel="stylesheet" href="report.css">
</head>
<body>

<header class="hdr" id="hdr"></header>

<main class="wrap" style="padding-bottom:8px">

  <div class="verdict" id="verdict"></div>

  <div class="cards" id="cards"></div>

  <section class="sec">
    <div class="sec-title">Summary <span class="sec-count" id="tblCount"></span></div>
    <div class="tbl-wrap"><table id="tbl"></table></div>
  </section>

  <section class="sec">
    <div class="sec-title">Details <span class="sec-count" id="secCount"></span></div>

    <div class="toolbar">
      <div class="search" id="search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="searchInput" type="text" placeholder="Search resources, attributes, addresses…  ( / )" spellcheck="false" autocomplete="off">
        <button class="search-clear" id="searchClear" aria-label="Clear search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
      </div>
      <span class="search-count" id="searchCount"></span>
      <span class="tb-spacer"></span>
      <button class="btn" id="wrapBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><path d="M3 12h15a3 3 0 1 1 0 6h-4"/><polyline points="16 16 14 18 16 20"/><line x1="3" y1="18" x2="10" y2="18"/></svg>Wrap</button>
      <button class="btn" id="expandBtn"></button>
    </div>

    <div id="details"></div>
  </section>

</main>

<footer class="ftr wrap">
  <span>Generated by <b style="color:var(--muted)">tf9</b> &nbsp;·&nbsp; <span class="mono" id="ftrTime"></span></span>
  <span style="display:flex;gap:14px"><a href="Plan Report.html">plan</a><a href="Apply Report.html">apply</a><a href="Destroy Report.html">destroy</a></span>
  <span class="mono">terraform destroy</span>
</footer>

<div class="toast" id="toast"></div>

<script src="data-destroy.js"></script>
<script src="report.js"></script>
<script>
  (function () {
    var d = window.RUN && window.RUN.startedAt ? new Date(window.RUN.startedAt) : new Date();
    document.getElementById("ftrTime").textContent = d.toUTCString().replace("GMT", "UTC");
  })();
</script>

</body>
</html>
